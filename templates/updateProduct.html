<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Update Product</title>

    <style>
      * {
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        background: linear-gradient(135deg, #667eea, #764ba2);
        padding: 40px;
        margin: 0;
      }

      .container {
        max-width: 650px;
        margin: auto;
        background: #ffffff;
        padding: 30px;
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        animation: fadeIn 0.4s ease-in-out;
      }

      h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
      }

      label {
        font-weight: 600;
        margin-top: 10px;
        display: block;
        color: #555;
      }

      input,
      textarea,
      select {
        width: 100%;
        padding: 12px;
        margin-top: 6px;
        margin-bottom: 12px;
        border-radius: 8px;
        border: 1px solid #ddd;
        transition: 0.2s;
        font-size: 14px;
      }

      input:focus,
      textarea:focus,
      select:focus {
        border-color: #667eea;
        outline: none;
        box-shadow: 0 0 5px rgba(102, 126, 234, 0.4);
      }

      button {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #28a745, #218838);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 17px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(15px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Update Product</h2>

      <form action="{{ url_for('update_product', id=product.id) }}" method="POST">
        <label>Product Name</label>
        <input type="text" name="name" value="{{ product.name }}" required />

        <label>Description</label>
        <textarea name="description" rows="3" required>{{ product.description }}</textarea>

        <label>Price (₹)</label>
        <input type="number" name="price" value="{{ product.price }}" required />

        <label>Original Price (₹)</label>
        <input type="number" name="original_price" value="{{ product.original_price }}" />

        <label>Discount (%)</label>
        <input type="number" name="discount" value="{{ product.discount }}" />

        <label>Brand</label>
        <input type="text" name="brand" value="{{ product.brand }}" />

        <label>Category</label>
        <input type="text" name="category" value="{{ product.category }}" />

        <label>Product Image</label>
        <input type="text" name="image" value="{{ product.image }}" />

        <label>Main Color</label>
        <input type="text" name="color" value="{{ product.color }}" />

        <label>Variant Color</label>
        <input type="text" name="vcolor" value="{{ product.vcolor }}" />

        <label>Rating (out of 5)</label>
        <input type="number" step="0.1" name="rating" value="{{ product.rating }}" />

        <label>Reviews Count</label>
        <input type="number" name="reviews" value="{{ product.reviews }}" />

        <label>Best Product?</label>
        <select name="isBest">
          <option value="False" {% if not product.isBest %}selected{% endif %}>No</option>
          <option value="True" {% if product.isBest %}selected{% endif %}>Yes</option>
        </select>

        <label>Color Variety?</label>
        <select name="colorVariety">
          <option value="True" {% if product.colorVariety %}selected{% endif %}>Yes</option>
          <option value="False" {% if not product.colorVariety %}selected{% endif %}>No</option>
        </select>

        <button type="submit">Update Product</button>
      </form>
    </div>
  </body>
</html>
