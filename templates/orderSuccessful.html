{% extends "base.html" %}
{% block title %}Order Successful{% endblock %}
{% block content %}

<link
  href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
  rel="stylesheet"
/>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
  }

  body {
    height: 100vh;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .container {
    padding: 5px;
    max-width: 420px;
    margin: 40px auto;
  }

  .wrapper {
    text-align: center;
    max-width: 500px;
    padding: 20px;
  }

  .circle {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 3px solid #ff4c3b;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 25px;
    animation: pop 0.4s ease;
  }

  @keyframes pop {
    from {
      transform: scale(0.7);
      opacity: 0;
    }
    to {
      transform: scale(1);
      opacity: 1;
    }
  }

  .checkmark {
    width: 75px;
    height: 75px;
  }

  .checkmark path {
    stroke: #ff4c3b;
    stroke-width: 5.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
    stroke-dasharray: 60;
    stroke-dashoffset: 60;
    animation: draw 0.6s ease forwards;
  }

  @keyframes draw {
    to {
      stroke-dashoffset: 0;
    }
  }

  h1 {
    font-size: 28px;
    margin-bottom: 10px;
    color: #222;
  }

  p {
    color: #666;
    font-size: 15px;
    margin-bottom: 25px;
  }

  .order-id {
    font-size: 14px;
    margin-bottom: 30px;
    color: #ff4c3b;
    font-weight: 500;
  }

  .buttons {
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
  }

  .btn {
    padding: 12px 22px;
    border-radius: 30px;
    text-decoration: none;
    font-size: 14px;
    transition: 0.3s;
  }

  .primary {
    background: #ff4c3b;
    color: white;
  }

  .primary:hover {
    background: #e04334;
  }

  .outline {
    border: 1px solid #ff4c3b;
    color: #ff4c3b;
  }

  .outline:hover {
    background: #ff4c3b;
    color: white;
  }

  .categories-icon-container {
    display: none;
  }

  @media (max-width: 500px) {
    h1 {
      font-size: 22px;
    }
  }
</style>

<div class="container">
  <div class="wrapper">
    <div class="circle">
      <svg viewBox="0 0 52 52" class="checkmark">
        <path d="M14 27l7 7 16-16" />
      </svg>
    </div>

    <h1>Order Confirmed!</h1>
    <p>Your order has been placed successfully and will be delivered soon.</p>

    <div class="order-id">Order ID: #{{ order_id }}</div>

    <div class="buttons">
      <a href="/index" class="btn primary">Continue Shopping</a>
      <a href="/user_orders" class="btn outline">View Orders</a>
    </div>
  </div>
</div>

{% endblock %}
